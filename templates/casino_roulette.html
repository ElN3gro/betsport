{% extends "base.html" %}
{% block title %}Ruleta — APUSM Casino{% endblock %}
{% block content %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap');
  :root{ --felt:#1a0008;--gold:#c9a84c;--gold2:#e8c97e }

  .rlt-wrap{ max-width:920px;margin:0 auto;padding:20px 12px }
  .rlt-table{
    background:radial-gradient(ellipse at 50% 30%,#3d0010 0%,var(--felt) 60%,#0d0003 100%);
    border:4px solid #8B6914;border-radius:20px;padding:20px;
    box-shadow:0 0 60px rgba(0,0,0,.8);
  }
  .rlt-title{ text-align:center;font-family:'Playfair Display',serif;font-size:13px;
    color:rgba(201,168,76,.5);letter-spacing:3px;text-transform:uppercase;margin-bottom:16px }

  /* Wheel display */
  .wheel-container{
    text-align:center;margin-bottom:20px;position:relative;height:200px;
  }
  .roulette-wheel{
    width:180px;height:180px;border-radius:50%;
    border:8px solid var(--gold);
    position:relative;margin:0 auto;
    background:conic-gradient(
      from 0deg,
      #2ecc71 0deg 9.73deg,  /* 0 */
      #e74c3c 9.73deg 19.46deg,   /* 32 */
      #1a1a1a 19.46deg 29.19deg,  /* 15 */
      #e74c3c 29.19deg 38.92deg,  /* 19 */
      #1a1a1a 38.92deg 48.65deg,  /* 4 */
      #e74c3c 48.65deg 58.38deg,  /* 21 */
      #1a1a1a 58.38deg 68.11deg,  /* 2 */
      #e74c3c 68.11deg 77.84deg,  /* 25 */
      #1a1a1a 77.84deg 87.57deg,  /* 17 */
      #e74c3c 87.57deg 97.3deg,   /* 34 */
      #1a1a1a 97.3deg 107.03deg,  /* 6 */
      #e74c3c 107.03deg 116.76deg,/* 27 */
      #1a1a1a 116.76deg 126.49deg,/* 13 */
      #e74c3c 126.49deg 136.22deg,/* 36 */
      #1a1a1a 136.22deg 145.95deg,/* 11 */
      #e74c3c 145.95deg 155.68deg,/* 30 */
      #1a1a1a 155.68deg 165.41deg,/* 8 */
      #e74c3c 165.41deg 175.14deg,/* 23 */
      #1a1a1a 175.14deg 184.87deg,/* 10 */
      #e74c3c 184.87deg 194.6deg, /* 5 */
      #1a1a1a 194.6deg 204.33deg,  /* 24 */
      #e74c3c 204.33deg 214.06deg,/* 16 */
      #1a1a1a 214.06deg 223.79deg,/* 33 */
      #e74c3c 223.79deg 233.52deg,/* 1 */
      #1a1a1a 233.52deg 243.25deg,/* 20 */
      #e74c3c 243.25deg 252.98deg,/* 14 */
      #1a1a1a 252.98deg 262.71deg,/* 31 */
      #e74c3c 262.71deg 272.44deg,/* 9 */
      #1a1a1a 272.44deg 282.17deg,/* 22 */
      #e74c3c 282.17deg 291.9deg,  /* 18 */
      #1a1a1a 291.9deg 301.63deg,  /* 29 */
      #e74c3c 301.63deg 311.36deg,/* 7 */
      #1a1a1a 311.36deg 321.09deg,/* 28 */
      #e74c3c 321.09deg 330.82deg,/* 12 */
      #1a1a1a 330.82deg 340.55deg,/* 35 */
      #e74c3c 340.55deg 350.28deg,/* 3 */
      #1a1a1a 350.28deg 360deg,  /* 26 */
      #2ecc71 360deg 369.73deg    /* 00 */
    );
    box-shadow:0 0 40px rgba(201,168,76,.4),inset 0 0 30px rgba(0,0,0,.6);
    transition:transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
  }
  
  .wheel-center{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:40px;height:40px;border-radius:50%;
    background:radial-gradient(circle,var(--gold),#8B6914);
    border:3px solid #fff;z-index:10;
  }
  
  .wheel-numbers{
    position:absolute;width:100%;height:100%;
    font-size:11px;font-weight:700;color:#fff;
    text-shadow:1px 1px 2px rgba(0,0,0,.8);
  }
  
  .wheel-number{
    position:absolute;transform-origin:50% 50%;
    width:20px;height:20px;text-align:center;line-height:20px;
    left:50%;top:50%;margin-left:-10px;margin-top:-10px;
  }
  
  .roulette-ball{
    position:absolute;width:12px;height:12px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%,#fff,#ccc);
    border:1px solid #999;box-shadow:0 2px 4px rgba(0,0,0,.3);
    top:50%;left:50%;transform:translate(-50%,-50%);
    opacity:0;z-index:15;
  }
  
  .ball-spinning{
    animation:ballSpin 3s ease-in-out;
  }
  
  @keyframes ballSpin{
    0%{opacity:0;transform:translate(-50%,-50%) rotate(0deg) translateX(70px) rotate(0deg);}
    20%{opacity:1;transform:translate(-50%,-50%) rotate(180deg) translateX(70px) rotate(-180deg);}
    40%{transform:translate(-50%,-50%) rotate(360deg) translateX(65px) rotate(-360deg);}
    60%{transform:translate(-50%,-50%) rotate(540deg) translateX(60px) rotate(-540deg);}
    80%{opacity:1;transform:translate(-50%,-50%) rotate(720deg) translateX(55px) rotate(-720deg);}
    100%{opacity:1;transform:translate(-50%,-50%) rotate(900deg) translateX(50px) rotate(-900deg);}
  }
  
  .ball-landing{
    animation:ballLand 1s ease-out forwards;
  }
  
  @keyframes ballLand{
    0%{transform:translate(-50%,-50%) rotate(900deg) translateX(50px) rotate(-900deg) scale(1);}
    100%{transform:translate(-50%,-50%) rotate(900deg) translateX(40px) rotate(-900deg) scale(2);}
  }
  
  .wheel-spinning{
    animation:wheelRotate 4s cubic-bezier(0.17, 0.67, 0.12, 0.99) forwards;
  }
  
  @keyframes wheelRotate{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(1800deg);}
  }
  
  .result-display{
    position:absolute;top:10px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.8);color:var(--gold);
    padding:8px 16px;border-radius:20px;font-weight:700;
    font-size:14px;opacity:0;z-index:20;
  }
  
  .result-show{
    animation:showResult 1s ease-out 3s forwards;
  }
  
  @keyframes showResult{
    0%{opacity:0;transform:translateX(-50%) scale(0.8);}
    100%{opacity:1;transform:translateX(-50%) scale(1.2);}
  }

  /* Tablero */
  .board{ display:flex;flex-direction:column;gap:2px;margin-bottom:16px }
  .board-row{ display:flex;gap:2px }

  .cell{
    flex:1;min-width:0;padding:8px 2px;text-align:center;font-size:13px;font-weight:600;
    border-radius:4px;cursor:pointer;transition:filter .15s,transform .1s;
    position:relative;user-select:none;font-family:'DM Sans',sans-serif;
    border:2px solid transparent;
  }
  .cell:hover{ filter:brightness(1.3);transform:scale(1.05) }
  .cell.selected{ border-color:var(--gold)!important;box-shadow:0 0 8px var(--gold) }
  .cell.red-cell{ background:#c0392b;color:#fff }
  .cell.black-cell{ background:#1a1a1a;color:#fff;border-color:#444 }
  .cell.green-cell{ background:#1e8449;color:#fff }
  .cell.outside{ background:rgba(255,255,255,.08);color:var(--text2);font-size:12px }
  .cell.outside:hover{ background:rgba(255,255,255,.15) }
  .chip-on{
    position:absolute;top:-8px;right:-8px;
    width:20px;height:20px;border-radius:50%;
    background:var(--gold);color:#111;font-size:9px;font-weight:700;
    display:flex;align-items:center;justify-content:center;
    border:1px solid #fff;
  }

  /* Fichas */
  .chips-row{ display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap }
  .chip{
    width:52px;height:52px;border-radius:50%;border:3px solid;
    display:flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:700;cursor:pointer;transition:transform .15s;
    font-family:'DM Sans',sans-serif;
  }
  .chip:hover{ transform:scale(1.12) }
  .chip.active{ transform:scale(1.15);box-shadow:0 0 12px currentColor }
  .chip.c100{ background:#c0392b;border-color:#e74c3c;color:#fff }
  .chip.c500{ background:#2471a3;border-color:#3498db;color:#fff }
  .chip.c1000{ background:#239b56;border-color:#27ae60;color:#fff }
  .chip.c5000{ background:#7d3c98;border-color:#9b59b6;color:#fff }

  /* Controles */
  .rlt-controls{ display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px }
  .btn-rlt{
    padding:10px 24px;border-radius:8px;font-weight:600;font-size:14px;
    cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:filter .15s;
  }
  .btn-rlt:hover{ filter:brightness(1.1) }
  .btn-spin{ background:linear-gradient(135deg,var(--gold),#a07730);color:#111;font-size:15px }
  .btn-clear{ background:rgba(255,255,255,.1);color:var(--text2) }
  .btn-rlt:disabled{ opacity:.35;cursor:not-allowed }

  .rlt-info{ display:flex;justify-content:space-between;align-items:center;
    background:rgba(0,0,0,.3);border-radius:8px;padding:10px 16px;margin-bottom:14px }
  .info-item{ text-align:center }
  .info-label{ font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px }
  .info-val{ font-size:16px;color:var(--gold);font-weight:700 }

  /* Historial */
  .history-row{ display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;justify-content:center }
  .hist-num{
    width:30px;height:30px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:700;
  }
  .hist-num.red-cell{ background:#c0392b;color:#fff }
  .hist-num.black-cell{ background:#1a1a1a;color:#fff;border:1px solid #444 }
  .hist-num.green-cell{ background:#1e8449;color:#fff }

  /* Resultado */
  .result-banner{
    text-align:center;font-family:'Playfair Display',serif;font-size:22px;
    padding:14px;border-radius:10px;margin:10px 0;display:none;
  }
  .result-banner.win{ background:rgba(46,204,113,.15);color:#2ecc71;border:1px solid rgba(46,204,113,.3) }
  .result-banner.lose{ background:rgba(231,76,60,.12);color:#e74c3c;border:1px solid rgba(231,76,60,.3) }

  .back-link{ display:block;text-align:center;margin-top:16px;color:var(--text3);font-size:13px }
</style>

<div class="rlt-wrap">
  <div class="rlt-table">
    <div class="rlt-title">🎡 Ruleta Americana · 0 y 00 · Pago justo 🎡</div>

    <!-- Rueda -->
    <div class="wheel-container">
      <div class="roulette-wheel" id="roulette-wheel">
        <div class="wheel-numbers" id="wheel-numbers"></div>
        <div class="wheel-center"></div>
        <div class="roulette-ball" id="roulette-ball"></div>
      </div>
      <div class="result-display" id="result-display">?</div>
      <div style="font-size:11px;color:var(--text3);margin-top:6px">Último número</div>
    </div>

    <!-- Info -->
    <div class="rlt-info">
      <div class="info-item">
        <div class="info-label">Saldo</div>
        <div class="info-val" id="balance-display">${{ "{:,.0f}".format(balance) }}</div>
      </div>
      <div class="info-item">
        <div class="info-label">Total apostado</div>
        <div class="info-val" id="total-bet-display">$0</div>
      </div>
      <div class="info-item">
        <div class="info-label">Ficha activa</div>
        <div class="info-val" id="active-chip-display">$100</div>
      </div>
    </div>

    <!-- Resultado -->
    <div class="result-banner" id="result-banner"></div>

    <!-- Fichas -->
    <div class="chips-row">
      <div class="chip c100 active"  onclick="selectChip(100,this)">$100</div>
      <div class="chip c500"         onclick="selectChip(500,this)">$500</div>
      <div class="chip c1000"        onclick="selectChip(1000,this)">$1K</div>
      <div class="chip c5000"        onclick="selectChip(5000,this)">$5K</div>
    </div>

    <!-- Tablero -->
    <div class="board" id="rlt-board"></div>

    <!-- Controles -->
    <div class="rlt-controls">
      <button class="btn-rlt btn-spin" id="btn-spin" onclick="spinWheel()">🎡 Girar ruleta</button>
      <button class="btn-rlt btn-clear" onclick="clearBets()">✕ Borrar apuestas</button>
    </div>

    <!-- Historial -->
    <div style="text-align:center;font-size:11px;color:var(--text3);margin-bottom:6px">Últimos números</div>
    <div class="history-row" id="history-row"></div>
  </div>
</div>

<script>
const REDS = new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
let activeChip = 100;
let bets = {};   // key → {type, value, amount}
let history = [];

function selectChip(v, el){
  activeChip = v;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('active-chip-display').textContent = '$'+v.toLocaleString();
}

function cellColor(n){
  if(n===0||n===37) return 'green-cell';
  return REDS.has(n) ? 'red-cell' : 'black-cell';
}

function buildWheel(){
  const wheelNumbers = document.getElementById('wheel-numbers');
  wheelNumbers.innerHTML = '';
  
  // Roulette wheel number order (American roulette)
  const wheelOrder = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26, 37]; // 37 = 00
  
  wheelOrder.forEach((num, i) => {
    const angle = (i * 360 / 38) - 90; // -90 to start from top
    const label = num === 37 ? '00' : num;
    const color = num === 0 || num === 37 ? '#2ecc71' : REDS.has(num) ? '#e74c3c' : '#1a1a1a';
    
    const numberDiv = document.createElement('div');
    numberDiv.className = 'wheel-number';
    numberDiv.textContent = label;
    numberDiv.style.color = color;
    numberDiv.style.transform = `rotate(${angle}deg) translateY(-70px) rotate(${-angle}deg)`;
    wheelNumbers.appendChild(numberDiv);
  });
}

function buildBoard(){
  const board = document.getElementById('rlt-board');
  board.innerHTML = '';

  // Fila 0 y 00
  let zeroRow = `<div class="board-row">
    <div class="cell green-cell" onclick="placeBet('straight','0',this)" data-key="s_0">0</div>
    <div class="cell green-cell" onclick="placeBet('straight','37',this)" data-key="s_37">00</div>
  </div>`;
  board.innerHTML += zeroRow;

  // Números 1-36 en 3 filas (columnas)
  // Layout: 12 filas × 3 columnas (1-3, 4-6, ... 34-36)
  for(let row=0; row<12; row++){
    let rowHTML = '<div class="board-row">';
    for(let col=0; col<3; col++){
      const n = row*3 + col + 1;
      const cc = cellColor(n);
      rowHTML += `<div class="cell ${cc}" onclick="placeBet('straight','${n}',this)" data-key="s_${n}">${n}</div>`;
    }
    rowHTML += '</div>';
    board.innerHTML += rowHTML;
  }

  // Apuestas externas
  board.innerHTML += `
  <div class="board-row">
    <div class="cell outside" onclick="placeBet('dozen','1',this)" data-key="d_1">1ª Docena (1-12)</div>
    <div class="cell outside" onclick="placeBet('dozen','2',this)" data-key="d_2">2ª Docena (13-24)</div>
    <div class="cell outside" onclick="placeBet('dozen','3',this)" data-key="d_3">3ª Docena (25-36)</div>
  </div>
  <div class="board-row">
    <div class="cell outside" onclick="placeBet('low','1',this)" data-key="low">Bajo (1-18)</div>
    <div class="cell outside" onclick="placeBet('even','1',this)" data-key="even">Par</div>
    <div class="cell outside red-cell" onclick="placeBet('red','1',this)" data-key="red">Rojo</div>
    <div class="cell outside black-cell" onclick="placeBet('black','1',this)" data-key="black">Negro</div>
    <div class="cell outside" onclick="placeBet('odd','1',this)" data-key="odd">Impar</div>
    <div class="cell outside" onclick="placeBet('high','1',this)" data-key="high">Alto (19-36)</div>
  </div>
  <div class="board-row">
    <div class="cell outside" onclick="placeBet('column','1',this)" data-key="c_1">Col. 1</div>
    <div class="cell outside" onclick="placeBet('column','2',this)" data-key="c_2">Col. 2</div>
    <div class="cell outside" onclick="placeBet('column','3',this)" data-key="c_3">Col. 3</div>
  </div>`;
}

function placeBet(type, value, el){
  const key = el.dataset.key;
  if(!bets[key]) bets[key] = {type, value, amount:0, el};
  bets[key].amount += activeChip;
  updateBetDisplay();
}

function clearBets(){
  bets = {};
  document.querySelectorAll('.cell').forEach(c=>{
    c.classList.remove('selected');
    const chip = c.querySelector('.chip-on');
    if(chip) chip.remove();
  });
  document.getElementById('total-bet-display').textContent='$0';
}

function updateBetDisplay(){
  let total = 0;
  document.querySelectorAll('.chip-on').forEach(c=>c.remove());
  for(const [key, b] of Object.entries(bets)){
    if(b.amount<=0) continue;
    total += b.amount;
    const el = document.querySelector(`[data-key="${key}"]`);
    if(el){
      el.classList.add('selected');
      el.insertAdjacentHTML('beforeend',`<div class="chip-on">${b.amount>=1000?Math.round(b.amount/1000)+'K':b.amount}</div>`);
    }
  }
  document.getElementById('total-bet-display').textContent = '$'+total.toLocaleString();
}

async function spinWheel(){
  const betList = Object.values(bets).filter(b=>b.amount>0).map(b=>({type:b.type,value:b.value,amount:b.amount}));
  if(!betList.length){ alert('Haz al menos una apuesta'); return; }

  const btn = document.getElementById('btn-spin');
  btn.disabled = true;

  // Enhanced animation with wheel and ball
  const wheel = document.getElementById('roulette-wheel');
  const ball = document.getElementById('roulette-ball');
  const resultDisplay = document.getElementById('result-display');
  
  // Reset animations
  wheel.classList.remove('wheel-spinning');
  ball.classList.remove('ball-spinning', 'ball-landing');
  resultDisplay.classList.remove('result-show');
  
  // Force reflow
  void wheel.offsetWidth;
  
  // Start animations
  wheel.classList.add('wheel-spinning');
  ball.classList.add('ball-spinning');
  
  // Get result from server
  const res = await fetch('/api/casino/roulette/spin',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({bets: betList})
  });
  const d = await res.json();

  if(!d.ok){ alert(d.msg||'Error'); btn.disabled=false; return; }

  // Calculate final wheel rotation based on winning number
  const wn = d.winning_number;
  const wheelOrder = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26, 37];
  const winningIndex = wheelOrder.indexOf(wn);
  const targetAngle = (winningIndex * 360 / 38) + 1800; // 5 full rotations + final position
  
  // Apply final rotation
  setTimeout(() => {
    wheel.style.transform = `rotate(${targetAngle}deg)`;
    
    // Ball landing animation with zoom
    setTimeout(() => {
      ball.classList.remove('ball-spinning');
      ball.classList.add('ball-landing');
      
      // Show result with zoom effect
      resultDisplay.textContent = `Número: ${d.winning_label}`;
      resultDisplay.style.color = wn===0||wn===37 ? '#2ecc71' : REDS.has(wn) ? '#e74c3c' : '#ecf0f1';
      resultDisplay.classList.add('result-show');
      
      // Update banner
      const banner = document.getElementById('result-banner');
      if(d.net > 0){
        banner.className='result-banner win';
        banner.textContent=`✓ Ganaste $${d.net.toLocaleString()} — Número: ${d.winning_label}`;
      } else {
        banner.className='result-banner lose';
        banner.textContent=`✗ Perdiste $${Math.abs(d.net).toLocaleString()} — Número: ${d.winning_label}`;
      }
      banner.style.display='block';
      
      // Update balance
      document.getElementById('balance-display').textContent='$'+d.new_balance.toLocaleString('es-CL');
      
      // Clear bets and re-enable button
      setTimeout(() => {
        clearBets();
        btn.disabled = false;
        wheel.classList.remove('wheel-spinning');
        ball.classList.remove('ball-landing');
        resultDisplay.classList.remove('result-show');
      }, 2000);
    }, 3000);
  }, 100);

  // Historial
  history.unshift(wn);
  if(history.length>20) history.pop();
  renderHistory();
}

function renderHistory(){
  const hr = document.getElementById('history-row');
  hr.innerHTML = history.map(n=>{
    const lbl = n===37?'00':String(n);
    const cls = n===0||n===37?'green-cell': REDS.has(n)?'red-cell':'black-cell';
    return `<div class="hist-num ${cls}">${lbl}</div>`;
  }).join('');
}

buildWheel();
buildBoard();
</script>
{% endblock %}
