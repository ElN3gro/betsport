{% extends "base.html" %}
{% block title %}Registro — APUUSM{% endblock %}
{% block content %}
<div style="max-width:460px;margin:50px auto">
  <div style="text-align:center;margin-bottom:24px">
    <div style="font-size:26px;font-weight:700"><span style="color:var(--usm-red)">APU</span>USM</div>
    <div style="font-size:13px;color:var(--text3);margin-top:5px">Registro con token de acceso</div>
  </div>
  <div class="card">
    <div class="card-title">Crear cuenta</div>
    <form method="POST">
      <div class="form-group">
        <label>Token de acceso <span style="color:var(--red)">*</span></label>
        <input type="text" name="token" required placeholder="Token entregado por el admin">
      </div>
      <div style="height:1px;background:var(--border);margin:16px 0"></div>
      <div class="form-group">
        <label>Nombre completo <span style="color:var(--red)">*</span></label>
        <input type="text" name="full_name" required placeholder="Juan Pérez">
      </div>
      <div class="grid2">
        <div class="form-group">
          <label>Teléfono <span style="color:var(--red)">*</span></label>
          <input type="text" name="phone" required placeholder="+56 9 1234 5678">
        </div>
        <div class="form-group">
          <label>Email (opcional)</label>
          <input type="email" name="email" placeholder="tu@email.com">
        </div>
      </div>
      <div class="form-group">
        <label>Nombre de usuario <span style="color:var(--red)">*</span></label>
        <input type="text" name="username" required placeholder="usuario_unico">
      </div>
      <div class="form-group">
        <label>Contraseña <span style="color:var(--red)">*</span></label>
        <input type="password" name="password" required placeholder="mínimo 6 caracteres">
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:6px">Crear cuenta</button>
    </form>
  </div>
  <div style="text-align:center;font-size:13px;color:var(--text3);margin-top:14px">
    <a href="{{ url_for('login') }}">← Volver al login</a>
  </div>
</div>
{% endblock %}
