{% extends "base.html" %}
{% block title %}Iniciar sesión — APUUSM{% endblock %}
{% block content %}
<div style="max-width:400px;margin:60px auto">
  <div style="text-align:center;margin-bottom:28px">
    <div style="font-size:28px;font-weight:700"><span style="color:var(--usm-red)">APU</span>USM</div>
    <div style="font-size:13px;color:var(--text3);margin-top:6px">Plataforma privada de apuestas</div>
  </div>
  <div class="card">
    <div class="card-title">Iniciar sesión</div>
    <form method="POST">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" name="username" required autofocus placeholder="tu_usuario">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:6px">Entrar</button>
    </form>
  </div>
  <div style="text-align:center;font-size:13px;color:var(--text3);margin-top:14px">
    ¿Tienes un token de acceso? <a href="{{ url_for('register') }}">Regístrate aquí</a>
  </div>
</div>
{% endblock %}
